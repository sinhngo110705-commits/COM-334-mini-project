name = "com-334"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "."

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "dana-db"
database_id = "fff7025c-2deb-4b5b-af7d-0b0a4295a706"

# R2 Storage Binding
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "dana-images"
